<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Glow effect -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="cursorGradient" cx="50%" cy="30%">
      <stop offset="0%" style="stop-color:#7c83fd;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0.3" />
    </radialGradient>
  </defs>
  
  <!-- Outer glow circle -->
  <circle cx="16" cy="16" r="10" fill="url(#cursorGradient)" filter="url(#glow)" opacity="0.6"/>
  
  <!-- Middle circle -->
  <circle cx="16" cy="16" r="6" fill="#7c83fd" opacity="0.5" filter="url(#glow)"/>
  
  <!-- Center dot -->
  <circle cx="16" cy="16" r="3" fill="#7c83fd" filter="url(#glow)"/>
</svg>
