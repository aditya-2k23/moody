name: Jules Automation (Labeling & Docs)

on:
  pull_request_target:
    types: [ opened, reopened ]
  issues:
    types: [ opened, reopened ]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  label-content:
    runs-on: ubuntu-latest
    steps:
      - name: Add labels to Jules-generated content
        uses: actions/github-script@v7
        with:
          script: |
            let isJulesContent = false;
            let labels = ['jules'];
            let number;

            if (context.eventName === 'pull_request_target') {
              const branchName = context.payload.pull_request.head.ref;
              const author = context.payload.pull_request.user.login;
              number = context.payload.pull_request.number;

              const isJulesDocsBranch = /^docs\/pr-[a-z0-9-]+-\d+$/i.test(branchName);
              const isJulesBranch = isJulesDocsBranch || /^jules\/[a-z0-9-]+$/i.test(branchName);
              const isJulesAuthor = author.toLowerCase().includes('jules');

              if (isJulesBranch || isJulesAuthor) {
                isJulesContent = true;
                if (isJulesDocsBranch) labels.push('docs');
              }
            } else if (context.eventName === 'issues') {
              const title = context.payload.issue.title;
              const author = context.payload.issue.user.login;
              const body = context.payload.issue.body || '';
              number = context.payload.issue.number;

              isJulesContent = author.toLowerCase().includes('jules') || 
                               title.toLowerCase().startsWith('[jules]') || 
                               body.toLowerCase().includes('generated by jules');
            }

            if (isJulesContent) {
              labels = [...new Set(labels)];
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: number,
                labels: labels
              });
              core.info(`Added labels ${labels.join(', ')} to ${context.eventName} #${number}`);
            }

  docs-automation:
    if: |
      github.event_name == 'pull_request_target' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      !startsWith(github.event.pull_request.head.ref, 'docs/pr-') &&
      !contains(github.event.pull_request.user.login, 'jules') &&
      !contains(github.event.pull_request.user.login, 'Jules')
    concurrency:
      group: jules-docs-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Jules documentation agent
        uses: BeksOmega/jules-action@v1.0.0
        with:
          starting_branch: ${{ github.event.pull_request.head.ref }}
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          prompt: |
            Review this pull request and generate documentation updates only.

            Requirements:
            - Add missing JSDoc/docstrings to all modified JavaScript, React, Firebase, hooks, API route and utility files.
            - Update README.md if the PR introduces:
              - new features
              - new dependencies
              - new environment variables
              - setup or deployment changes
            - Update CHANGELOG.md under [Unreleased] using Keep a Changelog style.
            - Update ROADMAP.md if a roadmap item has been completed or changed.
            - Keep the project stack aligned with:
              Next.js, React, Tailwind CSS, Firebase, Gemini API, Cloudinary, Upstash Redis.
            - Do not modify business logic.
            - Create a new branch named:
              docs/pr-<descriptive-name>-${{ github.event.pull_request.number }}
              Replace <descriptive-name> with a 2-3 word hyphenated summary of the changes.
            - Open a new pull request containing only documentation changes.
